<mat-nav-list>
  <a mat-list-item routerLink="/courses" routerLinkActive="active-link">
    <mat-icon matListItemIcon>library_books</mat-icon>
    <div matListItemTitle>All Courses</div>
  </a>

  <!-- Student Links -->
  <ng-container *ngIf="isLoggedIn && role === 'STUDENT'">
    <a mat-list-item routerLink="/student/dashboard" routerLinkActive="active-link">
      <mat-icon matListItemIcon>dashboard</mat-icon>
      <div matListItemTitle>Dashboard</div>
    </a>
    <a mat-list-item routerLink="/student/profile" routerLinkActive="active-link">
      <mat-icon matListItemIcon>person</mat-icon>
      <div matListItemTitle>My Profile</div>
    </a>
    <a mat-list-item routerLink="/student/notifications" routerLinkActive="active-link">
      <mat-icon matListItemIcon>notifications</mat-icon>
      <div matListItemTitle>Notifications</div>
    </a>
  </ng-container>

  <!-- Teacher Links -->
  <ng-container *ngIf="isLoggedIn && role === 'TEACHER'">
    <a mat-list-item routerLink="/teacher/dashboard" routerLinkActive="active-link">
      <mat-icon matListItemIcon>dashboard</mat-icon>
      <div matListItemTitle>Teacher Dashboard</div>
    </a>
    <a mat-list-item routerLink="/teacher/courses/new" routerLinkActive="active-link">
      <mat-icon matListItemIcon>add_circle</mat-icon>
      <div matListItemTitle>Create Course</div>
    </a>
    <a mat-list-item routerLink="/teacher/profile" routerLinkActive="active-link">
      <mat-icon matListItemIcon>person</mat-icon>
      <div matListItemTitle>My Profile</div>
    </a>
  </ng-container>

  <!-- Admin Links -->
  <ng-container *ngIf="isLoggedIn && role === 'ADMIN'">
    <a mat-list-item routerLink="/admin/dashboard" routerLinkActive="active-link">
      <mat-icon matListItemIcon>dashboard</mat-icon>
      <div matListItemTitle>Admin Dashboard</div>
    </a>
    <a mat-list-item routerLink="/admin/users" routerLinkActive="active-link">
      <mat-icon matListItemIcon>manage_accounts</mat-icon>
      <div matListItemTitle>Manage Users</div>
    </a>
  </ng-container>

  <a *ngIf="!isLoggedIn" mat-list-item routerLink="/login" routerLinkActive="active-link">
    <mat-icon matListItemIcon>login</mat-icon>
    <div matListItemTitle>Login</div>
  </a>
</mat-nav-list>
