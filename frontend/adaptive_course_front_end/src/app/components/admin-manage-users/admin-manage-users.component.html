<div class="manage-wrapper">
  <h2>Manage Users</h2>
  
  <div class="split-view">
    
    <!-- Add Teacher Form -->
    <div class="panel glass-panel">
      <h3>Add New Teacher</h3>
      <div *ngIf="successMsg" class="alert alert-success">{{ successMsg }}</div>
      <div *ngIf="errorMsg" class="alert alert-danger">{{ errorMsg }}</div>
      
      <form (ngSubmit)="createTeacher()" class="form-container">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" [(ngModel)]="newTeacher.fullName" name="fullName" class="input-field" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="newTeacher.email" name="email" class="input-field" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="newTeacher.password" name="password" class="input-field" required>
        </div>
        <div class="form-group">
          <label>Department</label>
          <input type="text" [(ngModel)]="newTeacher.department" name="department" class="input-field" required>
        </div>
        <button type="submit" class="btn-primary">Register Teacher</button>
      </form>
    </div>

    <!-- User Lists -->
    <div class="panel glass-panel">
      <h3>Registered Teachers</h3>
      <mat-spinner *ngIf="loading" diameter="30"></mat-spinner>
      <ul class="user-list" *ngIf="!loading">
        <li *ngFor="let t of teachers">
          <span>{{ t.fullName }} ({{ t.email }})</span>
          <button mat-icon-button color="warn" (click)="deleteTeacher(t.teacherId)">
            <mat-icon>delete</mat-icon>
          </button>
        </li>
      </ul>

      <h3 style="margin-top: 2rem;">Registered Students</h3>
      <ul class="user-list" *ngIf="!loading">
        <li *ngFor="let s of students">
          <span>{{ s.fullName }} ({{ s.email }})</span>
          <button mat-icon-button color="warn" (click)="deleteStudent(s.studentId)">
            <mat-icon>delete</mat-icon>
          </button>
        </li>
      </ul>
    </div>
    
  </div>
</div>
