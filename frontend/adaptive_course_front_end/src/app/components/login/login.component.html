<div class="login-wrapper">
  <div class="login-container glass-panel">
    <div class="login-header">
      <h2>Welcome Back</h2>
      <p class="subtitle">Please login to your account</p>
    </div>
    
    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>
    
    <form (ngSubmit)="login()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="text" id="email" [(ngModel)]="credentials.email" name="email" class="input-field" placeholder="Enter your email" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" [(ngModel)]="credentials.password" name="password" class="input-field" placeholder="Enter your password" required>
      </div>
      
      <button type="submit" class="btn-primary login-btn">Login</button>
    </form>
    
    <div class="login-footer">
      <p>Don't have an account? <a routerLink="/register">Register here</a></p>
    </div>
  </div>
</div>
